<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proyecto JX-EL</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron',sans-serif;
}

body{
background:#000;
overflow:hidden;
height:100vh;
color:white;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

.center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

.logo{
font-size:7vw;
font-weight:900;
letter-spacing:10px;
text-shadow:
0 0 10px #fff,
0 0 20px #fff,
0 0 40px #fff;
animation:pulse 2s infinite;
}

.sub{
margin-top:15px;
font-size:1rem;
opacity:.8;
letter-spacing:4px;
}

.btn{
margin-top:40px;
padding:15px 40px;
background:white;
color:black;
border:none;
font-size:1rem;
font-weight:bold;
cursor:pointer;
border-radius:50px;
transition:.3s;
}

.btn:hover{
transform:scale(1.1);
}

.portal{
position:fixed;
inset:0;
background:black;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
}

.portal h1{
font-size:8vw;
text-shadow:0 0 20px white;
}

.portal p{
margin-top:20px;
font-size:1.2rem;
opacity:.8;
}

@keyframes pulse{
50%{
transform:scale(1.05);
}
}
</style>
</head>
<body>

<canvas id="stars"></canvas>

<div class="center">
<div class="logo">JX-EL</div>
<div class="sub">ACCESO DESCONOCIDO</div>
<button class="btn" onclick="activar()">ENTRAR</button>
</div>

<div class="portal" id="portal">
<h1 id="mensaje"></h1>
<p>SISTEMA ACTIVADO</p>
</div>

<script>

const canvas=document.getElementById("stars");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let stars=[];

for(let i=0;i<250;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2
});
}

function animate(){
ctx.fillStyle="black";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="white";

stars.forEach(s=>{
ctx.beginPath();
ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
ctx.fill();

s.y+=s.r+0.3;

if(s.y>canvas.height){
s.y=0;
s.x=Math.random()*canvas.width;
}
});

requestAnimationFrame(animate);
}

animate();

function activar(){

document.querySelector(".center").style.display="none";
document.getElementById("portal").style.display="flex";

let texto="BIENVENIDO JOEL";
let i=0;

let intervalo=setInterval(()=>{

document.getElementById("mensaje").innerHTML+=texto[i];

i++;

if(i>=texto.length){
clearInterval(intervalo);
}

},120);

}

</script>

<section id="vault">

<style>
#vault{
position:fixed;
bottom:25px;
right:25px;
z-index:9999;
}

#orb{
width:90px;
height:90px;
border-radius:50%;
background:white;
box-shadow:
0 0 20px white,
0 0 40px white,
0 0 80px white;
cursor:pointer;
animation:orbFloat 3s infinite ease-in-out;
}

@keyframes orbFloat{
50%{
transform:translateY(-15px);
}
}

#terminal{
display:none;
position:fixed;
inset:0;
background:black;
color:white;
font-family:monospace;
padding:40px;
overflow:auto;
}

#line{
white-space:pre-wrap;
font-size:20px;
}
</style>

<div id="orb"></div>

<div id="terminal">
<div id="line"></div>
</div>

<script>

const orb=document.getElementById("orb");

orb.onclick=()=>{

document.getElementById("terminal").style.display="block";

const mensajes=[

"ESCANEANDO USUARIO...",
"",
"ACCESO ENCONTRADO",
"",
"IDENTIFICADOR: JOEL",
"",
"BUSCANDO DATOS...",
"",
"█████████████████ 100%",
"",
"RESULTADO:",
"",
"EL SISTEMA DETERMINA QUE ERES",
"EL PERSONAJE PRINCIPAL.",
"",
"NO ERES UN VISITANTE.",
"",
"ERES PARTE DEL SISTEMA.",
"",
"SECUENCIA COMPLETADA."

];

let i=0;

const escribir=setInterval(()=>{

if(i<mensajes.length){

document.getElementById("line").innerHTML +=
mensajes[i] + "<br>";

window.scrollTo(0,document.body.scrollHeight);

i++;

}else{

clearInterval(escribir);

setTimeout(()=>{

for(let x=0;x<150;x++){

let p=document.createElement("div");

p.style.position="fixed";
p.style.left=Math.random()*100+"vw";
p.style.top=Math.random()*100+"vh";
p.style.width="4px";
p.style.height="4px";
p.style.background="white";
p.style.borderRadius="50%";
p.style.boxShadow="0 0 10px white";

document.body.appendChild(p);

setTimeout(()=>{
p.remove();
},3000);

}

},1000);

}

},350);

};

</script>

</section>
<!-- =========================
     ACTUALIZACIÓN OMEGA-X
     PÉGALA ANTES DE </body>
========================= -->

<style>

#omegaBtn{
position:fixed;
top:20px;
left:20px;
width:70px;
height:70px;
border-radius:50%;
background:white;
cursor:pointer;
z-index:99999;
box-shadow:
0 0 20px white,
0 0 50px white;
animation:omegaPulse 2s infinite;
}

@keyframes omegaPulse{
50%{
transform:scale(1.15);
}
}

#omegaScreen{
position:fixed;
inset:0;
background:black;
display:none;
z-index:999999;
overflow:hidden;
}

#matrix{
position:absolute;
inset:0;
opacity:.2;
}

#omegaContent{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
width:90%;
max-width:1000px;
color:white;
}

#omegaTitle{
font-size:6vw;
font-weight:900;
letter-spacing:10px;
text-shadow:
0 0 10px white,
0 0 20px white,
0 0 40px white;
}

#omegaDesc{
margin-top:20px;
font-size:20px;
opacity:.8;
}

#levelBox{
margin-top:50px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.levelCard{
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.15);
padding:25px;
border-radius:20px;
backdrop-filter:blur(10px);
transition:.3s;
cursor:pointer;
}

.levelCard:hover{
transform:translateY(-10px);
box-shadow:0 0 20px white;
}

.levelCard h2{
margin-bottom:10px;
}

.levelCard p{
opacity:.7;
}

#secretMessage{
margin-top:40px;
font-size:25px;
min-height:40px;
}

#closeOmega{
margin-top:40px;
padding:15px 35px;
font-size:18px;
border:none;
cursor:pointer;
background:white;
color:black;
border-radius:50px;
font-weight:bold;
}

#achievement{
position:fixed;
bottom:-100px;
left:50%;
transform:translateX(-50%);
background:white;
color:black;
padding:20px 35px;
border-radius:15px;
font-weight:bold;
transition:.5s;
z-index:9999999;
}

#radar{
position:absolute;
width:400px;
height:400px;
border-radius:50%;
border:2px solid rgba(255,255,255,.2);
top:50%;
left:50%;
transform:translate(-50%,-50%);
pointer-events:none;
}

#scan{
position:absolute;
width:2px;
height:200px;
background:white;
left:50%;
top:50%;
transform-origin:bottom;
animation:spin 4s linear infinite;
}

@keyframes spin{
from{
transform:translateX(-50%) rotate(0deg);
}
to{
transform:translateX(-50%) rotate(360deg);
}
}

</style>

<div id="omegaBtn"></div>

<div id="omegaScreen">

<canvas id="matrix"></canvas>

<div id="radar">
<div id="scan"></div>
</div>

<div id="omegaContent">

<div id="omegaTitle">
OMEGA-X
</div>

<div id="omegaDesc">
NIVEL OCULTO DETECTADO
</div>

<div id="levelBox">

<div class="levelCard" onclick="unlock(1)">
<h2>RANGO 01</h2>
<p>Iniciar análisis</p>
</div>

<div class="levelCard" onclick="unlock(2)">
<h2>RANGO 02</h2>
<p>Escaneo avanzado</p>
</div>

<div class="levelCard" onclick="unlock(3)">
<h2>RANGO 03</h2>
<p>Acceso prohibido</p>
</div>

<div class="levelCard" onclick="unlock(4)">
<h2>RANGO 04</h2>
<p>Clasificación máxima</p>
</div>

</div>

<div id="secretMessage"></div>

<button id="closeOmega">
CERRAR
</button>

</div>

</div>

<div id="achievement">
LOGRO DESBLOQUEADO
</div>

<script>

const omegaBtn=document.getElementById("omegaBtn");
const omegaScreen=document.getElementById("omegaScreen");

omegaBtn.onclick=()=>{
omegaScreen.style.display="block";
};

document.getElementById("closeOmega").onclick=()=>{
omegaScreen.style.display="none";
};

function unlock(level){

const msg=document.getElementById("secretMessage");

const mensajes=[
"",
"ESCANEO COMPLETO...",
"SEÑAL DETECTADA...",
"ACCESO RESTRINGIDO SUPERADO...",
"CLASIFICACIÓN FINAL: LEYENDA"
];

let texto=mensajes[level];

msg.innerHTML="";

let i=0;

let efecto=setInterval(()=>{

msg.innerHTML+=texto[i] || "";

i++;

if(i>texto.length){
clearInterval(efecto);

mostrarLogro(
"RANGO "+level+" DESBLOQUEADO"
);

}

},60);

}

function mostrarLogro(texto){

const logro=document.getElementById("achievement");

logro.innerHTML=texto;

logro.style.bottom="30px";

setTimeout(()=>{
logro.style.bottom="-100px";
},3000);

}

const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let letras="01JOELXOMEGASYSTEM";

letras=letras.split("");

let fontSize=16;

let columns=canvas.width/fontSize;

let drops=[];

for(let i=0;i<columns;i++){
drops[i]=1;
}

function draw(){

ctx.fillStyle="rgba(0,0,0,0.08)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="white";
ctx.font=fontSize+"px monospace";

for(let i=0;i<drops.length;i++){

let text=
letras[
Math.floor(
Math.random()*letras.length
)
];

ctx.fillText(
text,
i*fontSize,
drops[i]*fontSize
);

if(
drops[i]*fontSize>
canvas.height &&
Math.random()>0.975
){
drops[i]=0;
}

drops[i]++;

}

}

setInterval(draw,35);

let codigo="";

document.addEventListener("keydown",(e)=>{

codigo+=e.key.toLowerCase();

if(codigo.includes("joel")){

mostrarLogro(
"MODO SECRETO ACTIVADO"
);

document.body.style.filter=
"contrast(120%) brightness(120%)";

setTimeout(()=>{
document.body.style.filter="";
},5000);

codigo="";

}

if(codigo.length>30){
codigo="";
}

});

</script>
</body>
</html>
