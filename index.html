// --- GENERADOR DE ESTRELLAS ---
function crearEstrellas() {
const numeroEstrellas = 100; // Puedes subir o bajar este número si quieres más o menos estrellas

for (let i = 0; i < numeroEstrellas; i++) {
const estrella = document.createElement('div');
estrella.classList.add('estrella');

estrella.style.height = tamano + 'px';

estrella.style.top = Math.random() * 100 + 'vh';

// Opacidad "en bajito" (entre 0.1 y 0.5) para que no cansen la vista

document.body.appendChild(estrella);
}

<!-- 🎨 ESTILOS CSS PARA EL MENÚ Y LA RULETA 🎨 -->

<!-- 🧠 LÓGICA JAVASCRIPT REESTRUCTURADA 🧠 -->
<script>
// Lista de premios configurables
const opcionesPremios = ["10 ROBUX 🪙", "CAMISETA VIP 👕", "SUERTE... ❌", "RANGO FAN ⭐", "50 ROBUX 🪙", "SHORT EXCL. 🩳", "SORPRESA ORO 🎁", "NADA... 🍃"];
const coloresPremios = ["#111111", "#222222", "#333333", "#1a1a1a", "#2e2e2e", "#444444", "#0a0a0a", "#242424"]; // Tonos oscuros estéticos

let canvas = null;
let ctx = null;
let centro = 0;
let anguloActual = 0;
let estaGirando = false;

// Al dar clic en ENTRAR en la pantalla de inicio
function entrar() {
  document.querySelector('.contenedor').style.display = 'none';
  abrirSeccion('menu-principal');
}

// Navegación limpia entre secciones
function abrirSeccion(idSeccion) {
  // Esconder el menú y la ruleta
  document.getElementById('menu-principal').style.display = 'none';
  document.getElementById('seccion-ruleta').style.display = 'none';
  
  // Mostrar la sección elegida
  document.getElementById(idSeccion).style.display = 'block';
  
  // Si abrimos la ruleta, la dibujamos por primera vez
  if (idSeccion === 'seccion-ruleta') {
    setTimeout(inicializarRuleta, 50);
  }
}

function inicializarRuleta() {
  canvas = document.getElementById("ruletaCanvas");
  ctx = canvas.getContext("2d");
  centro = canvas.width / 2;
  dibujarRuleta();
}

function dibujarRuleta() {
  if (!ctx) return;
  const numOpciones = opcionesPremios.length;
  const arco = (2 * Math.PI) / numOpciones;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (let i = 0; i < numOpciones; i++) {
    let anguloGajo = anguloActual + i * arco;
    
    ctx.fillStyle = coloresPremios[i % coloresPremios.length];
    ctx.beginPath();
    ctx.moveTo(centro, centro);
    ctx.arc(centro, centro, centro - 5, anguloGajo, anguloGajo + arco);
    ctx.lineTo(centro, centro);
    ctx.fill();
    ctx.strokeStyle = "rgba(255,255,255,0.2)";
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.save();
    ctx.fillStyle = "white";
    ctx.font = "bold 12px Arial";
    ctx.translate(centro, centro);
    ctx.rotate(anguloGajo + arco / 2);
    ctx.textAlign = "right";
    ctx.fillText(opcionesPremios[i], centro - 20, 4);
    ctx.restore();
  }

  // Centro de la ruleta
  ctx.beginPath();
  ctx.arc(centro, centro, 20, 0, 2 * Math.PI);
  ctx.fillStyle = "white";
  ctx.fill();
}

function girarRuleta() {
  if (estaGirando) return;
  estaGirando = true;
  document.querySelector(".boton-girar").disabled = true;
  document.getElementById("mensaje-premio").innerText = "🎰 Girando...";

  const girosBase = 6 + Math.random() * 4;
  const anguloFinal = girosBase * 2 * Math.PI + Math.random() * 2 * Math.PI;
  const tiempoTotal = 3500;
  let tiempoInicio = null;

  function animar(tiempoActual) {
    if (!tiempoInicio) tiempoInicio = tiempoActual;
    let progreso = tiempoActual - tiempoInicio;
    
    if (progreso < tiempoTotal) {
      let t = progreso / tiempoTotal;
      let easeOut = 1 - Math.pow(1 - t, 3);
      anguloActual = easeOut * anguloFinal;
      dibujarRuleta();
      requestAnimationFrame(animar);
    } else {
      anguloActual = anguloFinal % (2 * Math.PI);
      dibujarRuleta();
      calcularPremio();
      estaGirando = false;
      document.querySelector(".boton-girar").disabled = false;
    }
  }
  requestAnimationFrame(animar);
}

function calcularPremio() {
  const numOpciones = opcionesPremios.length;
  const arco = (2 * Math.PI) / numOpciones;
  let anguloMarcador = (3 * Math.PI) / 2 - anguloActual;
  while (anguloMarcador < 0) anguloMarcador += 2 * Math.PI;
  
  let indiceGanador = Math.floor(anguloMarcador / arco) % numOpciones;
  document.getElementById("mensaje-premio").innerText = "🎉 ¡Ganaste: " + opcionesPremios[indiceGanador] + "!";
}
</script>
