<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adopta un Perrito</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    margin:0;
    padding:0;
}

header{
    background:#ff9800;
    color:white;
    text-align:center;
    padding:20px;
}

.contenedor{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    padding:20px;
}

.tarjeta{
    background:white;
    width:300px;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 4px 8px rgba(0,0,0,0.2);
}

.tarjeta img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.info{
    padding:15px;
}

.boton{
    display:block;
    text-align:center;
    background:#4CAF50;
    color:white;
    text-decoration:none;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
}
</style>
</head>

<body>

<header>
    <h1>🐶 Perritos en Adopción 🐶</h1>
    <p>Encuentra a tu nuevo mejor amigo</p>
</header>

<div class="contenedor">

    <div class="tarjeta">
        <img src="https://images.unsplash.com/photo-1517849845537-4d257902454a?w=600" alt="Perrito">
        <div class="info">
            <h2>Max</h2>
            <p>2 años • Juguetón y amigable.</p>
            <a href="#" class="boton">Adoptar</a>
        </div>
    </div>

    <div class="tarjeta">
        <img src="https://images.unsplash.com/photo-1587300003388-59208cc962cb?w=600" alt="Perrito">
        <div class="info">
            <h2>Luna</h2>
            <p>1 año • Muy cariñosa y tranquila.</p>
            <a href="#" class="boton">Adoptar</a>
        </div>
    </div>

    <div class="tarjeta">
        <img src="https://images.unsplash.com/photo-1543466835-00a7907e9de1?w=600" alt="Perrito">
        <div class="info">
            <h2>Rocky</h2>
            <p>3 años • Le encanta correr.</p>
            <a href="#" class="boton">Adoptar</a>
        </div>
    </div>

</div>

</body>
</html>
