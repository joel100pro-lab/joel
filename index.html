<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proyecto JX-EL</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron',sans-serif;
}

body{
background:#000;
overflow:hidden;
height:100vh;
color:white;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

.center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

.logo{
font-size:7vw;
font-weight:900;
letter-spacing:10px;
text-shadow:
0 0 10px #fff,
0 0 20px #fff,
0 0 40px #fff;
animation:pulse 2s infinite;
}

.sub{
margin-top:15px;
font-size:1rem;
opacity:.8;
letter-spacing:4px;
}

.btn{
margin-top:40px;
padding:15px 40px;
background:white;
color:black;
border:none;
font-size:1rem;
font-weight:bold;
cursor:pointer;
border-radius:50px;
transition:.3s;
}

.btn:hover{
transform:scale(1.1);
}

.portal{
position:fixed;
inset:0;
background:black;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
}

.portal h1{
font-size:8vw;
text-shadow:0 0 20px white;
}

.portal p{
margin-top:20px;
font-size:1.2rem;
opacity:.8;
}

@keyframes pulse{
50%{
transform:scale(1.05);
}
}
</style>
</head>
<body>

<canvas id="stars"></canvas>

<div class="center">
<div class="logo">JX-EL</div>
<div class="sub">ACCESO DESCONOCIDO</div>
<button class="btn" onclick="activar()">ENTRAR</button>
</div>

<div class="portal" id="portal">
<h1 id="mensaje"></h1>
<p>SISTEMA ACTIVADO</p>
</div>

<script>

const canvas=document.getElementById("stars");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let stars=[];

for(let i=0;i<250;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2
});
}

function animate(){
ctx.fillStyle="black";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="white";

stars.forEach(s=>{
ctx.beginPath();
ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
ctx.fill();

s.y+=s.r+0.3;

if(s.y>canvas.height){
s.y=0;
s.x=Math.random()*canvas.width;
}
});

requestAnimationFrame(animate);
}

animate();

function activar(){

document.querySelector(".center").style.display="none";
document.getElementById("portal").style.display="flex";

let texto="BIENVENIDO JOEL";
let i=0;

let intervalo=setInterval(()=>{

document.getElementById("mensaje").innerHTML+=texto[i];

i++;

if(i>=texto.length){
clearInterval(intervalo);
}

},120);

}

</script>

<section id="vault">

<style>
#vault{
position:fixed;
bottom:25px;
right:25px;
z-index:9999;
}

#orb{
width:90px;
height:90px;
border-radius:50%;
background:white;
box-shadow:
0 0 20px white,
0 0 40px white,
0 0 80px white;
cursor:pointer;
animation:orbFloat 3s infinite ease-in-out;
}

@keyframes orbFloat{
50%{
transform:translateY(-15px);
}
}

#terminal{
display:none;
position:fixed;
inset:0;
background:black;
color:white;
font-family:monospace;
padding:40px;
overflow:auto;
}

#line{
white-space:pre-wrap;
font-size:20px;
}
</style>

<div id="orb"></div>

<div id="terminal">
<div id="line"></div>
</div>

<script>

const orb=document.getElementById("orb");

orb.onclick=()=>{

document.getElementById("terminal").style.display="block";

const mensajes=[

"ESCANEANDO USUARIO...",
"",
"ACCESO ENCONTRADO",
"",
"IDENTIFICADOR: JOEL",
"",
"BUSCANDO DATOS...",
"",
"█████████████████ 100%",
"",
"RESULTADO:",
"",
"EL SISTEMA DETERMINA QUE ERES",
"EL PERSONAJE PRINCIPAL.",
"",
"NO ERES UN VISITANTE.",
"",
"ERES PARTE DEL SISTEMA.",
"",
"SECUENCIA COMPLETADA."

];

let i=0;

const escribir=setInterval(()=>{

if(i<mensajes.length){

document.getElementById("line").innerHTML +=
mensajes[i] + "<br>";

window.scrollTo(0,document.body.scrollHeight);

i++;

}else{

clearInterval(escribir);

setTimeout(()=>{

for(let x=0;x<150;x++){

let p=document.createElement("div");

p.style.position="fixed";
p.style.left=Math.random()*100+"vw";
p.style.top=Math.random()*100+"vh";
p.style.width="4px";
p.style.height="4px";
p.style.background="white";
p.style.borderRadius="50%";
p.style.boxShadow="0 0 10px white";

document.body.appendChild(p);

setTimeout(()=>{
p.remove();
},3000);

}

},1000);

}

},350);

};

</script>

</section>
</body>
</html>
